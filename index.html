<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StegoSecure - LSB Steganography</title>

    <!-- FIX: favicon error -->
    <link rel="icon" href="data:,">

    <!-- Tailwind (ok for now) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>

<body class="bg-slate-950 text-slate-200">

<header class="bg-slate-900 border-b border-slate-800 py-5">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-sky-500 rounded-2xl flex items-center justify-center text-2xl">🕉️</div>
            <h1 class="title-font text-3xl font-bold">StegoSecure</h1>
        </div>
        <div class="text-sm text-slate-400"> Image Steganography </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-12">
<div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

<!-- EMBED -->
<div class="bg-slate-900 rounded-3xl p-8">
    <h2 class="text-2xl font-semibold mb-6">
        <i class="fas fa-lock text-purple-400"></i> Embed Message
    </h2>

    <form onsubmit="embedMessage(event)" class="space-y-6">
        <input type="file" id="embed-image" accept="image/*" required>

        <textarea id="secret-message" rows="3"
            placeholder="ENTER YOUR SECRET MESSAGE"
            class="w-full bg-slate-800 border border-slate-700 rounded-3xl px-6 py-4"></textarea>

        <input type="password" id="embed-pass"
            placeholder="Password (optional)"
            class="w-full bg-slate-800 border border-slate-700 rounded-3xl px-6 py-4">

        <button type="submit"
            class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-3xl">
            Embed Message
        </button>
    </form>

    <div id="embed-result" class="hidden mt-6 p-4 bg-slate-800 rounded-3xl"></div>
</div>

<!-- EXTRACT -->
<div class="bg-slate-900 rounded-3xl p-8">
    <h2 class="text-2xl font-semibold mb-6">
        <i class="fas fa-unlock text-emerald-400"></i> Extract Message
    </h2>

    <form onsubmit="extractMessage(event)" class="space-y-6">
        <input type="file" id="extract-image" accept="image/*" required>

        <input type="password" id="extract-pass"
            placeholder="Password (if used)"
            class="w-full bg-slate-800 border border-slate-700 rounded-3xl px-6 py-4">

        <button type="submit"
            class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-3xl">
            Extract Message
        </button>
    </form>

    <div id="extract-result" class="hidden mt-6 p-6 bg-slate-800 rounded-3xl">
        <div class="text-emerald-400">Extracted Message:</div>
        <div id="extracted-text"></div>
    </div>
</div>

</div>
</main>

<script>
const BASE_URL = "https://your-app-name.onrender.com"; // 🔥 CHANGE THIS

async function embedMessage(e) {
    e.preventDefault();

    const file = document.getElementById('embed-image').files[0];
    const message = document.getElementById('secret-message').value.trim();
    const password = document.getElementById('embed-pass').value.trim();

    if (!file) return alert("Select image");

    const formData = new FormData();
    formData.append('image', file);
    formData.append('message', message);
    if (password) formData.append('password', password);

    const resDiv = document.getElementById('embed-result');
    resDiv.classList.remove('hidden');
    resDiv.innerHTML = "⏳ Processing...";

    try {
        const res = await fetch(`${BASE_URL}/embed`, {
            method: 'POST',
            body: formData
        });

        const data = await res.json();

        if (data.stegoBase64) {
            const link = document.createElement('a');
            link.href = `data:image/png;base64,${data.stegoBase64}`;
            link.download = 'stego.png';
            link.click();

            resDiv.innerHTML = "✅ Embedded & Downloaded!";
        } else {
            resDiv.innerHTML = "❌ " + (data.error || "Failed");
        }
    } catch (err) {
        resDiv.innerHTML = "❌ " + err.message;
    }
}

async function extractMessage(e) {
    e.preventDefault();

    const file = document.getElementById('extract-image').files[0];
    const password = document.getElementById('extract-pass').value.trim();

    if (!file) return alert("Select image");

    const formData = new FormData();
    formData.append('image', file);
    if (password) formData.append('password', password);

    try {
        const res = await fetch(`${BASE_URL}/extract`, {
            method: 'POST',
            body: formData
        });

        const data = await res.json();

        const resultDiv = document.getElementById('extract-result');
        const textDiv = document.getElementById('extracted-text');

        resultDiv.classList.remove('hidden');

        if (data.message) {
            textDiv.textContent = data.message;
        } else {
            textDiv.innerHTML = "❌ No message found";
        }

    } catch (err) {
        alert("Error: " + err.message);
    }
}
</script>

</body>
</html>
